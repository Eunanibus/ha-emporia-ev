name: Release

# Manually-triggered release: bump manifest.json, commit, tag, and publish a
# GitHub Release — but only after the full quality gate passes. Run it from
# the Actions tab → "Release" → "Run workflow", entering the new version.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version, e.g. 0.1.3 (no leading 'v')"
        required: true
        type: string

permissions:
  contents: write # needed to push the version-bump commit + create the tag/release

jobs:
  gate:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Validate version format (X.Y.Z)
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '${{ inputs.version }}' is not X.Y.Z (no leading v)"
            exit 1
          fi
      - name: Ruff (lint + format)
        run: |
          ruff check .
          ruff format --check .
      - name: mypy (strict)
        run: mypy custom_components/emporia_ev
      - name: pytest
        run: pytest -q

  validate:
    name: hassfest + HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: hassfest
        uses: home-assistant/actions/hassfest@master
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  release:
    name: Bump, tag, and release
    runs-on: ubuntu-latest
    needs: [gate, validate] # only runs if BOTH gate jobs pass
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail if tag already exists
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi
      - name: Bump manifest.json version
        run: |
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path("custom_components/emporia_ev/manifest.json")
          m = json.loads(p.read_text())
          m["version"] = "${{ inputs.version }}"
          p.write_text(json.dumps(m, indent=2) + "\n")
          print("manifest version ->", m["version"])
          PY
      - name: Commit the bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/emporia_ev/manifest.json
          git commit -m "chore: release v${{ inputs.version }}"
          git push origin HEAD:main
      - name: Create tag + GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --target "$(git rev-parse HEAD)" \
            --title "v${{ inputs.version }}" \
            --generate-notes
